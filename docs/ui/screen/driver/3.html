<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#a3cbf2",
                        "surface-bright": "#363a3e",
                        "primary": "#a3cbf2",
                        "tertiary-fixed": "#ffdbc8",
                        "inverse-on-surface": "#2d3135",
                        "error": "#ffb4ab",
                        "secondary-fixed-dim": "#c4c0ff",
                        "outline": "#8c9198",
                        "tertiary": "#ffb68b",
                        "surface-container-low": "#181c20",
                        "on-primary-container": "#7fa7cd",
                        "on-background": "#e0e2e8",
                        "primary-container": "#0b3c5d",
                        "on-secondary-fixed-variant": "#3622ca",
                        "outline-variant": "#42474e",
                        "surface-container": "#1c2024",
                        "error-container": "#93000a",
                        "on-tertiary-fixed": "#321200",
                        "on-primary-fixed-variant": "#1f4a6c",
                        "secondary-container": "#3826cd",
                        "secondary": "#c4c0ff",
                        "surface-dim": "#101418",
                        "on-error-container": "#ffdad6",
                        "inverse-primary": "#396285",
                        "background": "#101418",
                        "on-primary": "#003353",
                        "surface-container-high": "#262a2f",
                        "surface-container-lowest": "#0b0f13",
                        "primary-fixed-dim": "#a3cbf2",
                        "primary-fixed": "#cee5ff",
                        "on-primary-fixed": "#001d32",
                        "surface": "#101418",
                        "surface-container-highest": "#31353a",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#ffb68b",
                        "on-tertiary-fixed-variant": "#753400",
                        "on-surface": "#e0e2e8",
                        "on-secondary-container": "#b4b0ff",
                        "inverse-surface": "#e0e2e8",
                        "on-tertiary-container": "#ff801d",
                        "tertiary-container": "#602a00",
                        "on-secondary": "#2000a4",
                        "secondary-fixed": "#e3dfff",
                        "on-secondary-fixed": "#100069",
                        "on-surface-variant": "#c2c7ce",
                        "surface-variant": "#31353a",
                        "on-tertiary": "#522300"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .vibrate-short:active {
            transform: scale(0.98);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body antialiased">
<!-- Top App Bar (Emergency State) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#101418] transition-colors">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#ffb68b]" data-icon="warning">warning</span>
<h1 class="font-headline font-bold tracking-tight text-xl text-[#ffb68b]">EMERGENCY OVERRIDE</h1>
</div>
<div class="bg-[#262a2f] px-3 py-1 rounded-lg text-xs font-label font-bold tracking-widest text-[#e0e2e8] opacity-60">
            SYSTEM CRITICAL
        </div>
</header>
<!-- Main Content Canvas -->
<main class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Background Texture & Radial Glow -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20 bg-[radial-gradient(circle_at_center,_#ff7a00_0%,_transparent_70%)]"></div>
<div class="absolute inset-0 z-0 pointer-events-none opacity-[0.03]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBgMm4ivOAhrqVNhdvmTsVuyPmFiWs5PN80GQUxAD1FEDyavQk2ZeHvSGg0MkbhbL8Vvy6lZacxtvmTs4SCRsnMYk2OGZaSv2hHfucu5tMryzuXTbsQHsd0I9BCdWUTbazIit5tmkaY-wiRZSHRwCWzBCqsHS8ZrugV9nU2TwxEq7rWv3WepbGR7AYGH0IH6tzwHfg2M2jS9ou0sIfaQVErFIoE_T0s_pFJqaACscm_3PLnYZQXu6o8SNau3qw1TnqZGixKySaOseLK');"></div>
<!-- Full Screen Alert Overlay -->
<div class="w-full max-w-2xl bg-surface-container-low rounded-2xl p-8 md:p-12 shadow-[0px_0px_80px_rgba(255,122,0,0.15)] relative z-10 text-center flex flex-col items-center">
<!-- Large Emergency Icon -->
<div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-tertiary-container flex items-center justify-center mb-8 ring-8 ring-background">
<span class="material-symbols-outlined text-6xl md:text-8xl text-tertiary" data-icon="wifi_off" style="font-variation-settings: 'FILL' 1;">wifi_off</span>
</div>
<!-- Failure Message -->
<div class="space-y-4 mb-12">
<h2 class="font-headline font-extrabold text-4xl md:text-6xl text-[#ff7a00] tracking-tighter uppercase">
                    GPS FAILURE
                </h2>
<div class="w-16 h-1 bg-[#ff7a00] mx-auto rounded-full"></div>
<p class="font-body text-xl md:text-2xl text-on-surface max-w-md mx-auto leading-relaxed">
                    Immediate action required. Conductor unit has lost connection.
                </p>
</div>
<!-- Action Block -->
<div class="w-full grid grid-cols-1 gap-4 md:gap-6">
<!-- Primary Action -->
<button class="w-full h-20 md:h-24 bg-[#ff7a00] hover:bg-[#ff8a20] text-[#101418] font-headline font-black text-2xl uppercase tracking-widest rounded-2xl flex items-center justify-center gap-4 transition-all active:scale-95 shadow-lg shadow-[#ff7a00]/20">
<span class="material-symbols-outlined text-3xl" data-icon="navigation" style="font-variation-settings: 'FILL' 1;">navigation</span>
                    TAKE OVER TRIP
                </button>
<!-- Secondary Actions (Bento Row) -->
<div class="grid grid-cols-2 gap-4">
<button class="h-16 bg-surface-container-high hover:bg-surface-container-highest text-on-surface font-label font-bold uppercase tracking-widest rounded-xl transition-colors border border-outline-variant/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="refresh">refresh</span>
                        RETRY
                    </button>
<button class="h-16 bg-surface-container-high hover:bg-surface-container-highest text-on-surface-variant font-label font-bold uppercase tracking-widest rounded-xl transition-colors border border-outline-variant/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="close">close</span>
                        DISMISS
                    </button>
</div>
</div>
<!-- Telemetry Data (High Visibility Context) -->
<div class="mt-12 grid grid-cols-3 w-full gap-4 text-left">
<div class="p-4 bg-surface-container rounded-xl border-l-4 border-tertiary">
<p class="text-[0.6rem] font-label font-bold text-on-surface-variant tracking-widest uppercase">LAST SYNC</p>
<p class="text-lg font-headline font-bold text-on-surface">14:22:01</p>
</div>
<div class="p-4 bg-surface-container rounded-xl">
<p class="text-[0.6rem] font-label font-bold text-on-surface-variant tracking-widest uppercase">LATENCY</p>
<p class="text-lg font-headline font-bold text-on-surface">TIMEOUT</p>
</div>
<div class="p-4 bg-surface-container rounded-xl">
<p class="text-[0.6rem] font-label font-bold text-on-surface-variant tracking-widest uppercase">UNIT ID</p>
<p class="text-lg font-headline font-bold text-on-surface">C-8042</p>
</div>
</div>
</div>
<!-- Decorative Map Background Fragment (Representing the failure location) -->
<div class="absolute bottom-0 right-0 w-1/3 h-1/2 opacity-10 pointer-events-none filter grayscale contrast-125">
<img alt="abstract dark topographic map visualization showing transit routes in deep shadows and neon highlights" class="w-full h-full object-cover" data-location="London" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCH9dOdZaW_Hw2Kn2qu9v3P8S3WHlJBTy94yowTexgvbFiM7c8nRRQEF2z4r7gUd3BKWj1ixIYLEvCfPnMulkMGVKlCb-44B14FYd-3sgUsf7ql8fzVvRhCUKOz1OFNJO3ZJFdJ27orz7jjTCgvlCEN_ZtwrhgeV121Vo27K-8JUysMKS8cuDnJNY-rNEY7qD8kW5TJzbD3dpkohyx2iqmRoemd5-fHkIqQTtniD86VVrbgQXXivBlpT03VkAV6Dv0UnfGksL35ndab"/>
</div>
</main>
<!-- Bottom Navigation (Standardized Shell) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-4 pt-2 bg-[#101418]/90 backdrop-blur-xl rounded-t-[1.5rem] shadow-[0px_-4px_40px_0px_rgba(0,0,0,0.15)]">
<div class="flex flex-col items-center justify-center text-[#e0e2e8]/50 px-6 py-2 transition-colors hover:text-[#a3cbf2]">
<span class="material-symbols-outlined mb-1" data-icon="dashboard">dashboard</span>
<span class="font-['Inter'] text-[0.6875rem] font-bold uppercase tracking-widest">DASHBOARD</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e0e2e8]/50 px-6 py-2 transition-colors hover:text-[#a3cbf2]">
<span class="material-symbols-outlined mb-1" data-icon="map">map</span>
<span class="font-['Inter'] text-[0.6875rem] font-bold uppercase tracking-widest">MAPS</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e0e2e8]/50 px-6 py-2 transition-colors hover:text-[#a3cbf2]">
<span class="material-symbols-outlined mb-1" data-icon="schedule">schedule</span>
<span class="font-['Inter'] text-[0.6875rem] font-bold uppercase tracking-widest">SCHEDULE</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#262a2f] text-[#a3cbf2] rounded-[1.5rem] px-6 py-2">
<span class="material-symbols-outlined mb-1" data-icon="notifications_active" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
<span class="font-['Inter'] text-[0.6875rem] font-bold uppercase tracking-widest">ALERTS</span>
</div>
</nav>
</body></html>
