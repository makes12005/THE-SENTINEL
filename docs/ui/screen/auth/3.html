<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Glassmorphism/Noise effect */
        .rugged-surface {
            background-image: radial-gradient(circle at top left, rgba(163, 203, 242, 0.05), transparent);
            position: relative;
        }
        .rugged-surface::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: 0;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body antialiased rugged-surface min-h-screen flex flex-col">
<!-- TopAppBar Execution from JSON -->
<header class="flex items-center w-full px-6 py-4 h-16 bg-[#181c20] sticky top-0 z-50">
<div class="flex items-center gap-4 w-full">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-[#262a2f] transition-colors duration-200 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[#a3cbf2]">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-[#a3cbf2]">Verify OTP</h1>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center px-6 max-w-lg mx-auto w-full relative z-10">
<!-- Header Text Section -->
<div class="text-center mb-12">
<div class="inline-flex items-center justify-center w-20 h-20 rounded-xl bg-surface-container-high mb-8">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">
                    shield_lock
                </span>
</div>
<h2 class="font-headline font-extrabold text-3xl mb-3 tracking-tight text-on-surface">Enter Code</h2>
<p class="font-body text-on-surface-variant text-base leading-relaxed">
                Enter the 6-digit code sent to your phone.
            </p>
</div>
<!-- OTP Input Grid -->
<div class="grid grid-cols-6 gap-3 mb-12 w-full">
<input autocomplete="one-time-code" class="w-full aspect-square text-center font-headline font-bold text-2xl bg-surface-container-high border-none rounded-xl text-primary focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all outline-none" maxlength="1" placeholder="•" type="text"/>
<input class="w-full aspect-square text-center font-headline font-bold text-2xl bg-surface-container-high border-none rounded-xl text-primary focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all outline-none" maxlength="1" placeholder="•" type="text"/>
<input class="w-full aspect-square text-center font-headline font-bold text-2xl bg-surface-container-high border-none rounded-xl text-primary focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all outline-none" maxlength="1" placeholder="•" type="text"/>
<input class="w-full aspect-square text-center font-headline font-bold text-2xl bg-surface-container-high border-none rounded-xl text-primary focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all outline-none" maxlength="1" placeholder="•" type="text"/>
<input class="w-full aspect-square text-center font-headline font-bold text-2xl bg-surface-container-high border-none rounded-xl text-primary focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all outline-none" maxlength="1" placeholder="•" type="text"/>
<input class="w-full aspect-square text-center font-headline font-bold text-2xl bg-surface-container-high border-none rounded-xl text-primary focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all outline-none" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Primary Action -->
<div class="w-full space-y-8">
<button class="w-full h-16 bg-on-tertiary-container text-on-tertiary font-headline font-extrabold text-lg rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-tertiary-container/20 hover:brightness-110 active:scale-[0.98] transition-all uppercase tracking-widest">
                VERIFY
                <span class="material-symbols-outlined">chevron_right</span>
</button>
<!-- Secondary Actions & Timer -->
<div class="flex flex-col items-center gap-4">
<div class="flex items-center gap-2 px-6 py-2 rounded-full bg-surface-container-low">
<span class="material-symbols-outlined text-secondary text-lg" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-headline font-bold text-secondary tracking-wider">00:30</span>
</div>
<button class="font-label font-bold text-sm uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors disabled:opacity-50" disabled="">
                    Resend OTP
                </button>
</div>
</div>
<!-- Contextual Visual - Subtle Dashboard Map/Route background -->
<div class="absolute bottom-0 left-0 right-0 h-64 -z-10 opacity-20 pointer-events-none overflow-hidden blur-2xl">
<div class="w-full h-full bg-gradient-to-t from-primary-container to-transparent"></div>
</div>
</main>
<!-- Asymmetric Data Visualization (Decorative) -->
<aside class="hidden lg:block fixed right-12 top-1/2 -translate-y-1/2 w-64 space-y-6">
<div class="p-6 bg-surface-container-low rounded-xl border-l-4 border-primary">
<h4 class="font-label text-xs font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-4">Security Level</h4>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-4/5 bg-primary rounded-full"></div>
</div>
<p class="font-body text-xs text-on-surface-variant mt-2">Enhanced encrypted verification protocol active.</p>
</div>
<div class="p-6 bg-surface-container-low rounded-xl border-l-4 border-tertiary">
<h4 class="font-label text-xs font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-2">Login Attempt</h4>
<div class="flex items-baseline gap-1">
<span class="font-headline font-bold text-2xl text-on-surface">192.168.1.1</span>
</div>
<p class="font-body text-xs text-on-surface-variant mt-1">Nairobi, KE • Primary Device</p>
</div>
</aside>
<!-- Footer Decoration (No Navigation) -->
<footer class="p-8 text-center text-on-surface-variant/30 font-label text-[10px] tracking-[0.3em] uppercase">
        Sentinel Secure Node v4.2.0
    </footer>
</body></html>
