<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Sentinel - Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#a3cbf2",
                    "surface-bright": "#363a3e",
                    "tertiary": "#ffb68b",
                    "surface-container-lowest": "#0b0f13",
                    "outline": "#8c9198",
                    "on-secondary-fixed": "#100069",
                    "background": "#101418",
                    "primary-fixed": "#cee5ff",
                    "on-tertiary": "#522300",
                    "inverse-surface": "#e0e2e8",
                    "on-secondary": "#2000a4",
                    "on-primary-fixed-variant": "#1f4a6c",
                    "surface-container-highest": "#31353a",
                    "primary": "#a3cbf2",
                    "surface": "#101418",
                    "on-surface-variant": "#c2c7ce",
                    "tertiary-container": "#602a00",
                    "on-error": "#690005",
                    "inverse-primary": "#396285",
                    "error": "#ffb4ab",
                    "primary-container": "#0b3c5d",
                    "secondary": "#c4c0ff",
                    "on-primary": "#003353",
                    "error-container": "#93000a",
                    "on-primary-fixed": "#001d32",
                    "on-primary-container": "#7fa7cd",
                    "inverse-on-surface": "#2d3135",
                    "tertiary-fixed-dim": "#ffb68b",
                    "tertiary-fixed": "#ffdbc8",
                    "surface-dim": "#101418",
                    "on-error-container": "#ffdad6",
                    "on-tertiary-fixed-variant": "#753400",
                    "on-secondary-fixed-variant": "#3622ca",
                    "secondary-fixed-dim": "#c4c0ff",
                    "on-secondary-container": "#b4b0ff",
                    "surface-container-low": "#181c20",
                    "secondary-fixed": "#e3dfff",
                    "secondary-container": "#3826cd",
                    "outline-variant": "#42474e",
                    "on-surface": "#e0e2e8",
                    "primary-fixed-dim": "#a3cbf2",
                    "on-background": "#e0e2e8",
                    "on-tertiary-container": "#ff801d",
                    "surface-container": "#1c2024",
                    "surface-container-high": "#262a2f",
                    "on-tertiary-fixed": "#321200",
                    "surface-variant": "#31353a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .noise-bg {
            background-image: radial-gradient(circle at 50% 50%, rgba(163, 203, 242, 0.05) 0%, rgba(16, 20, 24, 1) 100%);
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(163, 203, 242, 0.2);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-primary min-h-screen flex flex-col noise-bg">
<main class="flex-grow pt-16 pb-12 px-6 max-w-md mx-auto w-full">
<!-- 1. Top: Welcome Header -->
<div class="mb-10 text-center">
<h2 class="font-headline font-extrabold text-4xl text-on-surface tracking-tight mb-2">Welcome</h2>
<p class="text-on-surface-variant font-medium">Access your transit control terminal.</p>
</div>
<!-- 2. Login / Sign Up toggle -->
<div class="bg-surface-container-lowest p-1.5 rounded-full flex mb-10">
<button class="flex-1 py-3 px-4 rounded-full text-sm font-bold tracking-wider transition-all bg-surface-container-highest text-primary">
            LOGIN
        </button>
<button class="flex-1 py-3 px-4 rounded-full text-sm font-bold tracking-wider transition-all text-on-surface-variant hover:text-on-surface">
            SIGN UP
        </button>
</div>
<!-- 3. Continue with Google -->
<div class="mb-8">
<button class="w-full bg-surface-container-high hover:bg-surface-variant transition-colors border-none py-4 rounded-xl flex items-center justify-center gap-3 font-semibold text-on-surface">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCEhMhAS14snMCqgSGt_2gerPVe3WBk6jPpGQ2U9vHPct7gwHzK7f6o22qb-biLlAuFbq77_Xdr2vmPtZYDdltLqcPEFBp1W3_9PN348-b_NrkLDeRjOSR0IAuzz-0GrED78PzxpDZwZ4cJSy0fw_ICSU8Pj4Tm0rVXiYXGCbckBjxTYGq8el4rT5ljYPFDa7d5cPZ95U7Dwzu3Sr_iIFybmdxJOh8h7B9TOmXzmSmcAbXlH1D-Q70SZyd5ZwHXn-lkE3K8U4AKylZG"/>
            Continue with Google
        </button>
</div>
<div class="flex items-center gap-4 mb-8">
<div class="flex-1 h-[1px] bg-surface-container-highest"></div>
<span class="text-[0.6875rem] font-bold text-outline-variant tracking-widest uppercase">Or</span>
<div class="flex-1 h-[1px] bg-surface-container-highest"></div>
</div>
<!-- Auth Form -->
<div class="space-y-6">
<!-- 4. Phone Number input field -->
<div class="space-y-2">
<label class="block text-[0.6875rem] font-bold tracking-[0.1em] text-on-surface-variant uppercase ml-1">Phone Number</label>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 px-4 text-on-surface placeholder:text-outline-variant font-medium" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<!-- 5. Password input field -->
<div class="space-y-2">
<label class="block text-[0.6875rem] font-bold tracking-[0.1em] text-on-surface-variant uppercase ml-1">Password</label>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 px-4 text-on-surface placeholder:text-outline-variant font-medium" placeholder="••••••••" type="password"/>
</div>
<!-- Primary CTA -->
<div class="pt-2">
<button class="w-full bg-primary-container text-on-primary-container font-black text-lg py-5 rounded-xl tracking-widest transition-all active:scale-95 shadow-xl shadow-black/40 uppercase">
                LOGIN
            </button>
</div>
<!-- 6. Login with OTP text/link -->
<div class="flex flex-col items-center gap-4 pt-4">
<button class="text-sm font-bold text-primary hover:underline transition-colors uppercase tracking-wider">
                Login with OTP
            </button>
</div>
<!-- 7. OTP Specific Element (Initially Hidden) -->
<div class="hidden space-y-4 pt-4">
<button class="w-full bg-tertiary-container text-on-tertiary-container font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg shadow-tertiary-container/10 uppercase tracking-widest">
                SEND OTP
                <span class="material-symbols-outlined text-xl" data-icon="send">send</span>
</button>
</div>
</div>
</main>
<!-- Visual Polish: Gradient Orbs -->
<div class="fixed top-[-10%] right-[-10%] w-64 h-64 bg-primary/10 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-[-5%] left-[-10%] w-80 h-80 bg-secondary/5 rounded-full blur-[120px] -z-10"></div>
</body></html>
