<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Conductor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#101418",
                    "on-secondary-container": "#b4b0ff",
                    "surface-container": "#1c2024",
                    "primary-container": "#0b3c5d",
                    "on-tertiary-fixed-variant": "#753400",
                    "on-background": "#e0e2e8",
                    "surface-tint": "#a3cbf2",
                    "on-tertiary-fixed": "#321200",
                    "on-tertiary-container": "#ff801d",
                    "surface-variant": "#31353a",
                    "secondary-container": "#3826cd",
                    "surface": "#101418",
                    "on-error": "#690005",
                    "error": "#ffb4ab",
                    "secondary-fixed": "#e3dfff",
                    "inverse-on-surface": "#2d3135",
                    "background": "#101418",
                    "primary-fixed-dim": "#a3cbf2",
                    "inverse-surface": "#e0e2e8",
                    "inverse-primary": "#396285",
                    "tertiary-container": "#602a00",
                    "tertiary": "#ffb68b",
                    "on-secondary": "#2000a4",
                    "on-primary-fixed": "#001d32",
                    "tertiary-fixed": "#ffdbc8",
                    "surface-bright": "#363a3e",
                    "primary": "#a3cbf2",
                    "on-primary": "#003353",
                    "on-primary-fixed-variant": "#1f4a6c",
                    "surface-container-highest": "#31353a",
                    "secondary-fixed-dim": "#c4c0ff",
                    "on-surface-variant": "#c2c7ce",
                    "outline": "#8c9198",
                    "tertiary-fixed-dim": "#ffb68b",
                    "error-container": "#93000a",
                    "surface-container-low": "#181c20",
                    "surface-container-high": "#262a2f",
                    "on-tertiary": "#522300",
                    "on-error-container": "#ffdad6",
                    "primary-fixed": "#cee5ff",
                    "surface-container-lowest": "#0b0f13",
                    "on-surface": "#e0e2e8",
                    "on-primary-container": "#7fa7cd",
                    "on-secondary-fixed": "#100069",
                    "secondary": "#c4c0ff",
                    "on-secondary-fixed-variant": "#3622ca",
                    "outline-variant": "#42474e"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #101418;
            color: #e0e2e8;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .noise-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<div class="fixed inset-0 noise-overlay z-0"></div>
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-[#181c20] flex items-center justify-between px-6 h-16 w-full max-w-none">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-[#262a2f] transition-colors active:scale-95 duration-200 text-[#a3cbf2]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="font-headline font-extrabold tracking-tighter text-[#a3cbf2] text-lg leading-tight">Add New Conductor</h1>
<p class="font-label text-[10px] uppercase tracking-widest text-[#e0e2e8]/60 font-bold">Enter details below</p>
</div>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center border-none">
<span class="material-symbols-outlined text-primary" data-icon="person">person</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-6 relative z-10">
<div class="max-w-md mx-auto space-y-8">
<!-- Hero Illustration/Visual -->
<div class="w-full h-40 rounded-[2rem] bg-gradient-to-br from-primary-container to-surface-container-lowest flex items-center justify-center overflow-hidden relative">
<div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary via-transparent to-transparent"></div>
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-5xl text-primary" data-icon="badge">badge</span>
<span class="text-on-surface-variant font-label text-xs uppercase tracking-widest font-bold">New Personnel Entry</span>
</div>
</div>
<form class="space-y-6">
<!-- Full Name Field -->
<div class="space-y-2">
<label class="flex items-center gap-1 font-headline font-bold text-xs uppercase tracking-wider text-on-surface-variant">
                        Full Name <span class="text-tertiary">*</span>
</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all placeholder:text-on-surface-variant/30 font-medium" placeholder="e.g. Samuel Karanja" type="text"/>
<div class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant/40">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
</div>
</div>
<!-- Phone Number Field -->
<div class="space-y-2">
<label class="flex items-center gap-1 font-headline font-bold text-xs uppercase tracking-wider text-on-surface-variant">
                        Phone Number <span class="text-tertiary">*</span>
</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all placeholder:text-on-surface-variant/30 font-medium" inputmode="numeric" placeholder="+254 7XX XXX XXX" type="tel"/>
<div class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant/40">
<span class="material-symbols-outlined" data-icon="call">call</span>
</div>
</div>
</div>
<!-- ID Proof Field -->
<div class="space-y-2">
<label class="flex items-center gap-1 font-headline font-bold text-xs uppercase tracking-wider text-on-surface-variant">
                        ID Proof (Optional)
                    </label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all placeholder:text-on-surface-variant/30 font-medium" placeholder="National ID / Passport" type="text"/>
<div class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant/40">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>
</div>
</div>
</div>
<!-- Address / Village Field -->
<div class="space-y-2">
<label class="flex items-center gap-1 font-headline font-bold text-xs uppercase tracking-wider text-on-surface-variant">
                        Address / Village (Optional)
                    </label>
<div class="relative group">
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all placeholder:text-on-surface-variant/30 font-medium resize-none" placeholder="Residential location details..." rows="3"></textarea>
<div class="absolute top-4 right-4 text-on-surface-variant/40">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
</div>
</div>
</div>
</form>
</div>
</main>
<!-- Bottom Actions Layer -->
<footer class="fixed bottom-0 left-0 w-full bg-[#181c20]/90 backdrop-blur-xl px-6 py-6 pb-safe z-50 rounded-t-[2rem] shadow-[0px_-4px_40px_rgba(0,0,0,0.15)]">
<div class="max-w-md mx-auto flex flex-col gap-3">
<button class="w-full h-14 bg-primary-container text-on-primary-container font-headline font-extrabold text-sm uppercase tracking-widest rounded-xl flex items-center justify-center gap-2 active:scale-[0.98] transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                Save Conductor
            </button>
<button class="w-full h-12 text-[#e0e2e8]/60 font-headline font-bold text-xs uppercase tracking-widest flex items-center justify-center hover:text-on-surface transition-colors active:scale-95 duration-200">
                Cancel
            </button>
</div>
</footer>
<!-- Decorative Elements for the Sentinel Aesthetic -->
<div class="fixed top-1/3 -right-24 w-64 h-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-1/4 -left-24 w-48 h-48 bg-secondary/5 rounded-full blur-[80px] pointer-events-none"></div>
</body></html>
