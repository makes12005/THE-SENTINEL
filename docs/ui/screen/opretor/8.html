<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #101418;
            color: #e0e2e8;
            font-family: 'Inter', sans-serif;
        }
        .rugged-texture {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.02) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;

<body class="rugged-texture min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 z-50 w-full bg-[#101418] flex items-center justify-between px-6 py-4 border-none">
<h1 class="text-2xl font-black text-[#a3cbf2] uppercase tracking-tighter font-headline">Route Select</h1>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-[#262a2f] transition-colors duration-200 active:scale-95 text-[#a3cbf2]">
<span class="material-symbols-outlined">search</span>
</button>
<div class="w-10 h-10 rounded-xl bg-surface-container-high overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a professional transit operator wearing a clean dark uniform in low interior lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcVVvSoHObH7kqzegkas0ZqE6-ZC3zeHVHicGs327Phk1736vcgDIRv7gLjTCaV50dYlAXnQM32KFmAFD2HWa_Dlv4Z1ie7Se48BVUTctNtE8vSpuR-XIBtXgoDkwb-_dBcKdtJ-u8cH8XBqUWNhRhwfgTDw8jsEQbuF1LJGxUpiIf9bR0kgXFHgduB0juI3KPPkCkGCnxZYjJZwv557KqGjDLsKt3hJAvejLdSUCHtss-oUUcMxl7a1HPBoVpYhVIIXERyeLlqUUR"/>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 mt-20 px-4 pb-32 max-w-2xl mx-auto w-full">
<!-- Search Bar Section (High Density) -->
<div class="mb-6">
<div class="bg-surface-container-low rounded-xl flex items-center px-4 py-3 group focus-within:bg-surface-container-high transition-all duration-300">
<span class="material-symbols-outlined text-outline mr-3">search</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full font-body placeholder-outline-variant" placeholder="Search routes or stops..." type="text"/>
<span class="material-symbols-outlined text-outline ml-2">tune</span>
</div>
</div>
<!-- Section Label -->
<div class="mb-4 px-2">
<span class="text-[0.6875rem] font-bold tracking-[0.1em] text-on-surface-variant uppercase font-label">Recent Routes</span>
</div>
<!-- Compact Route List -->
<div class="space-y-1">
<!-- Route Card 1 -->
<button class="w-full text-left bg-surface-container-low hover:bg-surface-container-high transition-all duration-200 p-4 rounded-xl flex items-center justify-between group active:scale-[0.98]">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="text-lg font-bold font-headline text-on-surface tracking-tight">Surat → Mumbai</span>
<span class="bg-secondary-container text-on-secondary-container text-[10px] px-1.5 py-0.5 rounded font-black uppercase">Express</span>
</div>
<div class="flex items-center gap-3 text-xs text-on-surface-variant font-medium">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">route</span>8 Stops</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span>Used 5h ago</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Route Card 2 -->
<button class="w-full text-left bg-surface-container-low hover:bg-surface-container-high transition-all duration-200 p-4 rounded-xl flex items-center justify-between group active:scale-[0.98]">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="text-lg font-bold font-headline text-on-surface tracking-tight">Mumbai → Pune</span>
</div>
<div class="flex items-center gap-3 text-xs text-on-surface-variant font-medium">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">route</span>12 Stops</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span>Used 2d ago</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Route Card 3 -->
<button class="w-full text-left bg-surface-container-low hover:bg-surface-container-high transition-all duration-200 p-4 rounded-xl flex items-center justify-between group active:scale-[0.98]">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="text-lg font-bold font-headline text-on-surface tracking-tight">Ahmedabad → Surat</span>
</div>
<div class="flex items-center gap-3 text-xs text-on-surface-variant font-medium">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">route</span>5 Stops</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span>Used 1w ago</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Route Card 4 -->
<button class="w-full text-left bg-surface-container-low hover:bg-surface-container-high transition-all duration-200 p-4 rounded-xl flex items-center justify-between group active:scale-[0.98]">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="text-lg font-bold font-headline text-on-surface tracking-tight">Nashik → Mumbai</span>
</div>
<div class="flex items-center gap-3 text-xs text-on-surface-variant font-medium">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">route</span>15 Stops</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span>Used 1w ago</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
</div>
<!-- System Status Footer -->
<div class="mt-8 pt-6 border-t border-surface-variant/20 flex flex-col gap-2 opacity-60">
<div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest text-on-surface-variant">
<span>System Integrity: Nominal</span>
<span>ID: RT-992-SENTINEL</span>
</div>
<div class="h-1 w-full bg-surface-container-low rounded-full overflow-hidden">
<div class="h-full w-3/4 bg-primary/20"></div>
</div>
</div>
</main>
<!-- Prominent Fixed FAB / Create Action -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background via-background/90 to-transparent flex justify-center">
<button class="w-full max-w-2xl bg-primary-container hover:bg-primary-container/80 text-on-primary-container h-16 rounded-2xl flex items-center justify-center gap-3 shadow-2xl active:scale-[0.97] transition-all duration-200 group">
<span class="material-symbols-outlined text-2xl group-hover:rotate-90 transition-transform duration-300">add</span>
<span class="font-bold tracking-tight text-lg font-headline">+ CREATE NEW ROUTE</span>
</button>
</div>
