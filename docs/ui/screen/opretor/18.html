<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Bus - Fleet Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            darkMode: "class",

                extend: {
                    "colors": {
                        "surface-dim": "#101418",
                        "on-secondary-container": "#b4b0ff",
                        "surface-container": "#1c2024",

                        "on-background": "#e0e2e8",
                        "surface-tint": "#a3cbf2",
                        "on-tertiary-fixed": "#321200",
                        "on-tertiary-container": "#ff801d",
                        "surface-variant": "#31353a",
                        "secondary-container": "#3826cd",
                        "surface": "#101418",
                        "on-error": "#690005",
                        "error": "#ffb4ab",
                        "secondary-fixed": "#e3dfff",
                        "inverse-on-surface": "#2d3135",
                        "background": "#101418",
                        "primary-fixed-dim": "#a3cbf2",
                        "inverse-surface": "#e0e2e8",
                        "inverse-primary": "#396285",
                        "tertiary-container": "#602a00",
                        "tertiary": "#ffb68b",
                        "on-secondary": "#2000a4",
                        "on-primary-fixed": "#001d32",
                        "tertiary-fixed": "#ffdbc8",
                        "surface-bright": "#363a3e",
                        "primary": "#a3cbf2",
                        "on-primary": "#003353",
                        "on-primary-fixed-variant": "#1f4a6c",
                        "surface-container-highest": "#31353a",
                        "secondary-fixed-dim": "#c4c0ff",
                        "on-surface-variant": "#c2c7ce",
                        "outline": "#8c9198",
                        "tertiary-fixed-dim": "#ffb68b",
                        "error-container": "#93000a",
                        "surface-container-low": "#181c20",
                        "surface-container-high": "#262a2f",
                        "on-tertiary": "#522300",
                        "on-error-container": "#ffdad6",
                        "primary-fixed": "#cee5ff",
                        "surface-container-lowest": "#0b0f13",
                        "on-surface": "#e0e2e8",
                        "on-primary-container": "#7fa7cd",
                        "on-secondary-fixed": "#100069",
                        "secondary": "#c4c0ff",
                        "on-secondary-fixed-variant": "#3622ca",
                        "outline-variant": "#42474e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #101418; color: #e0e2e8; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-layering-no-borders { border: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dim min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-[#101418] text-[#a3cbf2] flex items-center justify-between px-6 h-16 tonal-layering-no-borders">
<div class="flex items-center gap-4">
<button aria-label="Back" class="p-2 -ml-2 hover:bg-[#262a2f] transition-colors rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div>
<h1 class="font-headline font-extrabold tracking-tighter text-xl text-[#a3cbf2]">Add New Bus</h1>
</div>
</div>
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img alt="Avatar" class="w-full h-full object-cover" data-alt="minimal flat avatar of a bus operator with dark blue cap and tech-focused aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDvu2q91NmxRm0QZTrZwxZpv4XN1ZWu6oo6paiH6vFrGDeDzCg8sQdkluMpmpoIT_Kt4YUEU9jc1ab4F9EIplv8s_ZCIfqgYDJY752_LwbFmj13r1qBpaGFLMKzwXv3S11LIO1_pyY7tM4cMO8Z-GaUyoGOamfxq9n19s6M2AXeLEvh-tsoL_6xQccP7tqFsWe6Mr0prH9eGLrx0mc-SKbCMO-ocwKo4xPlPG-GU1P8xBzR_7r1G31qkAsSrnr3pIAbEvRv5M6ovvmX"/>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-16 pb-32 px-6 pt-6 max-w-lg mx-auto w-full">
<div class="mb-8">
<p class="text-on-surface-variant font-body text-sm">Enter details below to register a new vehicle to the Fleet Management system.</p>
</div>
<!-- Form Layout -->
<form class="space-y-6">
<!-- Bus Number -->
<div class="space-y-2">
<label class="block text-xs font-bold font-headline uppercase tracking-widest text-on-surface-variant">
                    Bus Number <span class="text-on-tertiary-container">*</span>
</label>
<div class="relative group">
<input class="w-full h-14 px-4 bg-surface-container-high text-on-surface rounded-xl border-none focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/50 font-body text-base" placeholder="e.g. TN-01-AX-1234" type="text"/>
</div>
</div>
<!-- Bus Type Dropdown -->
<div class="space-y-2">
<label class="block text-xs font-bold font-headline uppercase tracking-widest text-on-surface-variant">
                    Bus Type <span class="text-on-tertiary-container">*</span>
</label>
<div class="relative">
<select class="w-full h-14 px-4 bg-surface-container-high text-on-surface rounded-xl border-none appearance-none focus:ring-2 focus:ring-primary-container transition-all font-body text-base">
<option disabled="" selected="" value="">Select Bus Type</option>
<option value="sleeper">Sleeper</option>
<option value="seater">Seater</option>
<option value="ac">AC</option>
<option value="non-ac">Non-AC</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
<span class="material-symbols-outlined text-outline">expand_more</span>
</div>
</div>
</div>
<!-- Total Seats -->
<div class="space-y-2">
<label class="block text-xs font-bold font-headline uppercase tracking-widest text-on-surface-variant">
                    Total Seats <span class="text-on-tertiary-container">*</span>
</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-high text-on-surface rounded-xl border-none focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/50 font-body text-base" placeholder="45" type="number"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
<span class="material-symbols-outlined text-outline">airline_seat_recline_normal</span>
</div>
</div>
</div>
<!-- Optional Notes -->
<div class="space-y-2">
<label class="block text-xs font-bold font-headline uppercase tracking-widest text-on-surface-variant">
                    Optional Notes
                </label>
<textarea class="w-full p-4 bg-surface-container-high text-on-surface rounded-xl border-none focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/50 font-body text-base resize-none" placeholder="Maintenance history, special features, or route assignments..." rows="4"></textarea>
</div>
<!-- Aesthetic Card Integration (Visual Flourish) -->
<div class="pt-4">
<div class="p-6 bg-primary-container/30 rounded-[1.5rem] border border-outline-variant/10 relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-[64px]" data-weight="fill">directions_bus</span>
</div>
<div class="relative z-10">
<h3 class="text-[#a3cbf2] font-headline font-bold text-sm mb-1 uppercase tracking-wider">Fleet Policy</h3>
<p class="text-on-surface-variant text-xs leading-relaxed">Ensure the vehicle meets the Sentinel Safety Standards before final submission.</p>
</div>
</div>
</div>
</form>
</main>
<!-- Bottom Actions Shell -->
<div class="fixed bottom-0 left-0 w-full bg-[#181c20]/90 backdrop-blur-xl px-6 pt-4 pb-8 shadow-[0px_-4px_40px_rgba(0,0,0,0.15)] rounded-t-[1.5rem]">
<div class="flex flex-col gap-3 max-w-lg mx-auto">
<button class="w-full h-14 bg-primary-container text-on-primary-container font-headline font-bold rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-weight="fill">save</span>
                SAVE
            </button>
<button class="w-full h-12 text-on-surface-variant font-headline font-bold text-sm uppercase tracking-widest hover:text-[#a3cbf2] transition-colors active:scale-95 duration-200">
                CANCEL
            </button>
</div>
</div>
</body></html>
